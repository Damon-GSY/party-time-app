<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>聚会时间 - Hero UI Preview</title>
<style>
:root{
--bg1:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;
--glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.06);--glass3:rgba(255,255,255,0.08);
--bdr:rgba(255,255,255,0.08);--bdr2:rgba(255,255,255,0.12);
--t1:#fff;--t2:rgba(255,255,255,0.7);--t3:rgba(255,255,255,0.45);
--acc:#6366f1;--acc2:#8b5cf6;--glow:#818cf8;
--gold:#f59e0b;--gold2:#d97706;
--em:#10b981;--rose:#f43f5e;--cyan:#06b6d4;
--r1:8px;--r2:12px;--r3:16px;--r4:24px;--rf:9999px;
--font:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);background:#0a0a0a;color:var(--t1);-webkit-font-smoothing:antialiased}

.phone{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:375px;height:812px;border-radius:44px;overflow:hidden;border:2px solid rgba(255,255,255,0.1);box-shadow:0 0 0 4px #000,0 0 60px rgba(99,102,241,0.15),0 25px 80px rgba(0,0,0,0.6)}
.phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;height:34px;background:#000;border-radius:0 0 20px 20px;z-index:1000}
.sbar{position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;z-index:999;font-size:12px;font-weight:600}
.app{width:100%;height:100%;background:linear-gradient(145deg,var(--bg1),var(--bg2) 50%,var(--bg3));position:relative;overflow:hidden}

/* Pages */
.pg{position:absolute;top:0;left:0;width:100%;height:100%;padding:60px 0 80px;overflow-y:auto;overflow-x:hidden;opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity .35s,transform .35s;-webkit-overflow-scrolling:touch}
.pg.active{opacity:1;transform:translateY(0);pointer-events:auto}
.pg::-webkit-scrollbar{width:0}
.pc{padding:16px 20px 48px;position:relative;z-index:10}

/* Tab bar */
.tabs{position:absolute;bottom:0;left:0;right:0;height:80px;display:flex;align-items:flex-start;justify-content:space-around;padding-top:8px;background:rgba(10,10,20,0.85);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-top:1px solid var(--bdr);z-index:100}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 12px;border-radius:var(--r2);transition:.2s;background:none;border:none;font-family:var(--font)}
.tab svg{width:22px;height:22px;fill:none;stroke:var(--t3);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:.3s}
.tab span{font-size:10px;color:var(--t3);font-weight:500;transition:.3s}
.tab.on svg{stroke:var(--acc);filter:drop-shadow(0 0 6px rgba(99,102,241,.5))}
.tab.on span{color:var(--acc)}

/* BG Beams */
.beams{position:absolute;inset:0;overflow:hidden;z-index:1;pointer-events:none}
.beam{position:absolute;width:2px;height:150%;opacity:0;filter:blur(.5px)}
.beam:nth-child(1){background:linear-gradient(180deg,transparent,rgba(99,102,241,.6),rgba(139,92,246,.4),transparent);left:20%;animation:bsweep 6s ease-in-out infinite}
.beam:nth-child(2){background:linear-gradient(180deg,transparent,rgba(6,182,212,.4),rgba(99,102,241,.6),transparent);left:55%;animation:bsweep 8s ease-in-out infinite 2s}
.beam:nth-child(3){background:linear-gradient(180deg,transparent,rgba(245,158,11,.3),rgba(236,72,153,.4),transparent);left:80%;animation:bsweep 7s ease-in-out infinite 4s}
@keyframes bsweep{0%{transform:translateY(-80%) rotate(8deg);opacity:0}15%{opacity:.8}50%{opacity:.5}85%{opacity:.8}100%{transform:translateY(20%) rotate(8deg);opacity:0}}

/* Meteors */
.meteors{position:absolute;inset:0;overflow:hidden;z-index:1;pointer-events:none}
.met{position:absolute;width:2px;height:80px;background:linear-gradient(180deg,rgba(255,255,255,.8),transparent);border-radius:var(--rf);opacity:0}
.met::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:4px;height:4px;background:#fff;border-radius:50%;box-shadow:0 0 6px 2px rgba(255,255,255,.6)}
.met:nth-child(1){top:-10%;left:15%;animation:mfall 3s ease-in infinite .5s}
.met:nth-child(2){top:-10%;left:40%;animation:mfall 3.5s ease-in infinite 1.8s}
.met:nth-child(3){top:-10%;left:65%;animation:mfall 2.8s ease-in infinite 3.2s}
.met:nth-child(4){top:-10%;left:80%;animation:mfall 4s ease-in infinite .8s}
.met:nth-child(5){top:-10%;left:30%;animation:mfall 3.2s ease-in infinite 2.5s}
@keyframes mfall{0%{transform:translateY(0) rotate(215deg);opacity:0}10%{opacity:1}70%{opacity:1}100%{transform:translateY(800px) rotate(215deg);opacity:0}}

/* Title char animation */
.tchars{display:flex;justify-content:center;gap:4px;margin-bottom:24px}
.tch{display:inline-block;font-size:36px;font-weight:800;background:linear-gradient(135deg,#fff,#a5b4fc 50%,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:blur(12px);opacity:0;animation:creveal .6s ease forwards}
.tch:nth-child(1){animation-delay:.1s}.tch:nth-child(2){animation-delay:.25s}.tch:nth-child(3){animation-delay:.4s}.tch:nth-child(4){animation-delay:.55s}
@keyframes creveal{0%{filter:blur(12px);opacity:0;transform:translateY(8px) scale(.9)}60%{filter:blur(2px);opacity:1}100%{filter:blur(0);opacity:1;transform:translateY(0) scale(1)}}

/* Border Beam btn */
.bbbtn{position:relative;width:100%;padding:14px 24px;border:none;border-radius:var(--r3);background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:16px;font-weight:600;font-family:var(--font);cursor:pointer;overflow:hidden;z-index:1;box-shadow:0 4px 20px rgba(99,102,241,.3);transition:.3s}
.bbbtn:hover{box-shadow:0 4px 30px rgba(99,102,241,.5);transform:translateY(-1px)}
.bbbtn::before{content:'';position:absolute;inset:-2px;border-radius:inherit;background:conic-gradient(from 0deg,transparent,#6366f1,#8b5cf6,#a78bfa,#818cf8,#6366f1,transparent);z-index:-2;animation:brot 3s linear infinite}
.bbbtn::after{content:'';position:absolute;inset:2px;border-radius:inherit;background:linear-gradient(135deg,var(--acc),var(--acc2));z-index:-1}
@keyframes brot{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Gold beam */
.bbbtn.gold{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(217,119,6,.1));box-shadow:0 0 20px rgba(245,158,11,.15);color:var(--gold)}
.bbbtn.gold::before{background:conic-gradient(from 0deg,transparent,#f59e0b,#fbbf24,#f59e0b,#d97706,#f59e0b,transparent)}
.bbbtn.gold::after{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(217,119,6,.1))}

/* Spotlight card */
.spcard{position:relative;background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r3);padding:20px;overflow:hidden;transition:.3s;cursor:pointer}
.spcard .spl{position:absolute;top:0;left:0;width:200px;height:200px;background:radial-gradient(circle,rgba(99,102,241,.15),transparent 70%);border-radius:50%;pointer-events:none;opacity:0;transition:.3s;transform:translate(-50%,-50%)}
.spcard:hover .spl{opacity:1}
.spcard:hover{border-color:rgba(99,102,241,.2);box-shadow:0 0 30px rgba(99,102,241,.1)}

/* Avatar shimmer */
.avw{position:relative;border-radius:50%;flex-shrink:0}
.avw.sm{width:28px;height:28px}.avw.md{width:48px;height:48px}.avw.lg{width:90px;height:90px}
.avshim{position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 0deg,#6366f1,#8b5cf6,#a78bfa,#c4b5fd,#818cf8,#6366f1);animation:shrot 3s linear infinite}
.avw.lg .avshim{inset:-4px}
.avph{position:absolute;inset:2px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--glow)}
.avw.sm .avph{inset:0;font-size:11px}.avw.md .avph{font-size:18px}.avw.lg .avph{inset:3px;font-size:32px}
.avw.sm .avshim{display:none}
@keyframes shrot{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Party cards */
.pcard{margin-bottom:16px}
.pcard-hd{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.pcard-info{flex:1;min-width:0}
.pcard-title{font-size:16px;font-weight:700;margin-bottom:4px}
.pcard-meta{font-size:12px;color:var(--t3)}
.pcard-tags{display:flex;gap:8px;flex-wrap:wrap}
.ptag{padding:4px 10px;border-radius:var(--rf);font-size:11px;font-weight:500;background:rgba(99,102,241,.1);color:var(--glow);border:1px solid rgba(99,102,241,.15)}
.pcard-ft{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)}
.pavatars{display:flex}
.pavatars .avw{margin-left:-8px}.pavatars .avw:first-child{margin-left:0}
.pstatus{font-size:12px;font-weight:600;padding:4px 12px;border-radius:var(--rf)}
.pstatus.v{background:rgba(99,102,241,.15);color:var(--glow)}
.pstatus.u{background:rgba(16,185,129,.15);color:var(--em)}
.pstatus.e{background:rgba(255,255,255,.05);color:var(--t3)}

/* Lamp */
.lamp{position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:250px;z-index:2;pointer-events:none}
.lamp-b{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:50px;height:50px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.9),rgba(99,102,241,.6) 40%,transparent 70%);box-shadow:0 0 40px rgba(99,102,241,.6),0 0 80px rgba(99,102,241,.3);animation:lbreathe 4s ease-in-out infinite}
.lamp-d{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:160px solid transparent;border-right:160px solid transparent;border-top:200px solid rgba(99,102,241,.06);filter:blur(20px);animation:lbreathe 4s ease-in-out infinite}
@keyframes lbreathe{0%,100%{opacity:.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.08)}}

/* Glass card */
.gcard{background:var(--glass2);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);border:1px solid var(--bdr);border-radius:var(--r4);padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.3)}

/* Input shimmer */
.igroup{margin-bottom:20px}
.ilabel{display:block;font-size:13px;font-weight:600;color:var(--t2);margin-bottom:8px}
.iwrap{position:relative;border-radius:var(--r2)}
.iwrap input{width:100%;padding:12px 16px;background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--t1);font-size:14px;font-family:var(--font);outline:none;transition:.3s}
.iwrap input::placeholder{color:var(--t3)}
.iwrap input:focus{border-color:var(--acc);background:rgba(99,102,241,.04);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.ishim{position:absolute;inset:0;border-radius:inherit;padding:2px;opacity:0;transition:.3s;pointer-events:none;background:conic-gradient(from var(--sa,0deg),transparent 60%,rgba(99,102,241,.5) 80%,transparent 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:sangle 2s linear infinite}
.iwrap:focus-within .ishim{opacity:1}
@property --sa{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes sangle{from{--sa:0deg}to{--sa:360deg}}

/* Spotlight option */
.spopt{position:relative;padding:14px 20px;background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r2);cursor:pointer;overflow:hidden;transition:.3s}
.spopt .spl{position:absolute;width:150px;height:150px;background:radial-gradient(circle,rgba(99,102,241,.12),transparent 70%);border-radius:50%;pointer-events:none;opacity:0;transform:translate(-50%,-50%);transition:.3s}
.spopt:hover .spl{opacity:1}.spopt:hover{border-color:rgba(99,102,241,.25)}
.spopt.sel{border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.08)}
.spopt.sel::after{content:'✓';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--acc);font-size:18px;font-weight:700;z-index:2}
.spopt-t{position:relative;z-index:2;font-size:14px;color:var(--t2)}
.spopt.sel .spopt-t{color:var(--glow)}

/* Time grid */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tcell{position:relative;aspect-ratio:2/1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--bdr);border-radius:var(--r1);cursor:pointer;overflow:hidden;transition:.2s;-webkit-tap-highlight-color:transparent;user-select:none}
.tcell:hover{background:var(--glass2);border-color:rgba(99,102,241,.2)}
.tcell.sel{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);box-shadow:0 0 12px rgba(99,102,241,.15)}
.tcell .tl{font-size:11px;color:var(--t2);font-weight:500}
.tcell.sel .tl{color:var(--glow)}
.rip{position:absolute;border-radius:50%;background:rgba(99,102,241,.4);transform:scale(0);animation:rexp .6s ease-out forwards;pointer-events:none}
@keyframes rexp{to{transform:scale(4);opacity:0}}

/* Progress */
.vcounter{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.vct{font-size:14px;color:var(--t2)}.vct b{color:var(--glow);font-size:18px}
.pbar{width:100%;height:4px;background:rgba(255,255,255,.06);border-radius:var(--rf);overflow:hidden;margin-bottom:20px}
.pfill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:var(--rf);transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(99,102,241,.4)}

/* Modal */
.modal{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:.3s}
.modal.show{opacity:1;pointer-events:auto}
.mdl{width:300px;padding:32px;background:var(--glass3);backdrop-filter:blur(30px) saturate(150%);-webkit-backdrop-filter:blur(30px) saturate(150%);border:1px solid var(--bdr2);border-radius:var(--r4);text-align:center;transform:scale(.9) translateY(20px);transition:transform .35s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.modal.show .mdl{transform:scale(1) translateY(0)}
.mdl-beam{position:absolute;inset:-2px;border-radius:inherit;background:conic-gradient(from 0deg,transparent,rgba(16,185,129,.6),transparent,rgba(6,182,212,.4),transparent);z-index:-1;animation:brot 4s linear infinite}
.mdl-icon{width:64px;height:64px;margin:0 auto 16px;border-radius:50%;background:rgba(16,185,129,.15);display:flex;align-items:center;justify-content:center;font-size:32px}
.mdl-title{font-size:20px;font-weight:700;margin-bottom:8px}
.mdl-desc{font-size:13px;color:var(--t2);margin-bottom:24px;line-height:1.6}
.mdl-btn{padding:12px 32px;border:none;border-radius:var(--r2);background:linear-gradient(135deg,var(--em),#059669);color:#fff;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;transition:.3s;box-shadow:0 4px 15px rgba(16,185,129,.3)}
.mdl-btn:hover{box-shadow:0 4px 25px rgba(16,185,129,.5);transform:translateY(-1px)}

/* Shimmer border card */
.sbcard{position:relative;background:var(--glass);border-radius:var(--r3);padding:20px;overflow:hidden}
.sbcard::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1.5px;background:conic-gradient(from var(--sa,0deg),rgba(99,102,241,.1),rgba(99,102,241,.5),rgba(139,92,246,.4),rgba(99,102,241,.1));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:sangle 3s linear infinite;pointer-events:none}

/* Heatmap */
.hmap{display:grid;grid-template-columns:48px repeat(7,1fr);gap:3px}
.hmap-h{font-size:9px;color:var(--t3);text-align:center;padding:4px 0;font-weight:500}
.hmap-t{font-size:9px;color:var(--t3);display:flex;align-items:center;justify-content:flex-end;padding-right:4px}
.hmap-c{aspect-ratio:1.4;border-radius:3px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.04);transition:.2s;cursor:pointer}
.hmap-c:hover{transform:scale(1.1)}
.h0{background:rgba(255,255,255,.03)}.h1{background:rgba(99,102,241,.1)}.h2{background:rgba(99,102,241,.2)}.h3{background:rgba(99,102,241,.35)}.h4{background:rgba(99,102,241,.5)}.h5{background:rgba(139,92,246,.6)}

/* Stat */
.scard{margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.slabel{font-size:13px;color:var(--t2)}
.sval{font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff,var(--glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Profile */
.phero{display:flex;flex-direction:column;align-items:center;padding:20px 0 30px;position:relative}
.plamp{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:120px;height:120px;background:radial-gradient(circle,rgba(99,102,241,.25),transparent 70%);pointer-events:none;animation:lbreathe 5s ease-in-out infinite}
.pname{font-size:22px;font-weight:800;margin-top:16px;background:linear-gradient(135deg,#fff,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pbio{font-size:13px;color:var(--t3);margin-top:6px;text-align:center}
.pstats{display:flex;gap:12px;margin-bottom:24px}
.pst{text-align:center;flex:1;padding:12px 8px;background:var(--glass);border-radius:var(--r2);border:1px solid var(--bdr)}
.pst-v{font-size:20px;font-weight:700;color:var(--glow)}
.pst-l{font-size:11px;color:var(--t3);margin-top:2px}

/* Menu item */
.mitem{position:relative;padding:14px 16px;background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r2);margin-bottom:8px;cursor:pointer;overflow:hidden;transition:.3s}
.mitem .spl{position:absolute;width:150px;height:150px;background:radial-gradient(circle,rgba(99,102,241,.12),transparent 70%);border-radius:50%;pointer-events:none;opacity:0;transform:translate(-50%,-50%);transition:.3s}
.mitem:hover .spl{opacity:1}.mitem:hover{border-color:rgba(99,102,241,.2)}
.mitem-c{display:flex;align-items:center;gap:12px;position:relative;z-index:2}
.mitem-i{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.mitem-t{flex:1}
.mitem-title{font-size:14px;font-weight:600}
.mitem-desc{font-size:11px;color:var(--t3);margin-top:2px}
.mitem-arr{color:var(--t3);font-size:14px}

/* Detail modal */
.dmdl .mdl{padding:24px;text-align:left;width:320px}
.dtime{font-size:28px;font-weight:800;background:linear-gradient(135deg,#fff,var(--glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.ddate{font-size:14px;color:var(--t2);margin-bottom:16px}
.drow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr)}
.drow-l{font-size:13px;color:var(--t3)}
.drow-v{font-size:13px;font-weight:600}
.davatars{display:flex;gap:6px;margin-top:12px;justify-content:center}

/* Utils */
.stit{font-size:18px;font-weight:700;margin-bottom:4px}
.ssub{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.5}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.mb6{margin-bottom:6px}
</style>
</head>
<body>
<div class="phone">
  <div class="sbar"><span>12:19</span><span style="display:flex;gap:5px;align-items:center">📶 📡 🔋</span></div>
  <div class="app" id="app">

    <!-- =================== HOME =================== -->
    <div class="pg active" id="pg-home">
      <div class="beams"><div class="beam"></div><div class="beam"></div><div class="beam"></div></div>
      <div class="meteors"><div class="met"></div><div class="met"></div><div class="met"></div><div class="met"></div><div class="met"></div></div>
      <div class="pc">
        <div class="tchars"><span class="tch">聚</span><span class="tch">会</span><span class="tch">时</span><span class="tch">间</span></div>
